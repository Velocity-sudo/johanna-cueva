<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Johanna Cueva — Return to Her | Sales Materials</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: #0a0a0f;
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center
        }

        .wrap {
            text-align: center;
            padding: 2rem
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: .5rem;
            background: linear-gradient(135deg, #b48cde, #7c5cb5);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent
        }

        p {
            color: rgba(255, 255, 255, .5);
            margin-bottom: 2rem;
            font-size: 1.1rem
        }

        .links {
            display: flex;
            gap: 1.5rem;
            justify-content: center;
            flex-wrap: wrap
        }

        a {
            display: inline-block;
            padding: 1rem 2.5rem;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 600;
            font-size: 1rem;
            transition: all .3s
        }

        .deck {
            background: linear-gradient(135deg, #7c5cb5, #b48cde);
            color: #fff
        }

        .guide {
            border: 2px solid #7c5cb5;
            color: #b48cde
        }

        a:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(124, 92, 181, .3)
        }
    </style>
</head>

<body>
    <div class="wrap">
        <h1>Return to Her</h1>
        <p>Sales Materials — Johanna Cueva</p>
        <div class="links">
            <a href="closing_deck.html" class="deck">📊 Closing Deck</a>
            <a href="guia_closer.html" class="guide">📋 Closer's Guide</a>
        </div>
    </div>
</body>

</html>
